  - Sketch
  - Design Systems

apis:

  - name: Abstract API
    description: The Abstract REST API provides programmatic access to design projects, branches, commits, files, collections, and component libraries managed within the Abstract platform. Access is provided via the abstract-sdk JavaScript library which supports both HTTP API and CLI transports.
